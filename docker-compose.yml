services:
  app:
    build: .
    container_name: semantic-search
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # ChromaDB + cached embeddings
      - ./sessions:/app/sessions  # Telegram/Instagram sessions
      - ./src:/app/src
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-search
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G

  # Optional: auto-sync Telegram every 30 min
  # Start with: docker compose --profile sync up -d
  sync:
    build: .
    container_name: semantic-search-sync
    profiles: ["sync"]
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
      - ./src:/app/src
    env_file: .env
    entrypoint: ["python", "src/auto_sync.py", "--interval", "30"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
