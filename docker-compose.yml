services:
  app:
    build: .
    container_name: semantic-search
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # ChromaDB + cached embeddings
      - ./sessions:/app/sessions  # Telegram/Instagram sessions
      - ./src:/app/src
    env_file: .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # Optional: auto-sync Telegram every 30 min
  # Start with: docker compose --profile sync up -d
  sync:
    build: .
    container_name: semantic-search-sync
    profiles: ["sync"]
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
      - ./src:/app/src
    env_file: .env
    entrypoint: ["python", "src/auto_sync.py", "--interval", "30"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
